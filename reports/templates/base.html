<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMP Report - {{ url }}</title>
<style>
    :root {
        --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #94a3b8; --text-light: #f8fafc;
        --crit: #ef4444; --high: #f97316; --med: #eab308; --low: #3b82f6; --info: #64748b; --accent: #2563eb;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1, h2, h3, h4 { color: var(--text-light); }
    .header { border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem; }
    .header h1 { font-size: 2.5rem; margin: 0 0 0.5rem; }
    .header .meta { display: flex; gap: 2rem; color: var(--text); font-size: 0.9rem; }
    .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #fff; }
    .badge-critical { background: var(--crit); } .badge-high { background: var(--high); }
    .badge-medium { background: var(--med); } .badge-low { background: var(--low); } .badge-info { background: var(--info); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    th { color: var(--text-light); font-weight: 600; background: rgba(255,255,255,0.02); }
    tr:hover { background: rgba(255,255,255,0.02); }
    .pre-text { white-space: pre-wrap; font-family: monospace; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; font-size: 0.85rem; }
    .counts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .count-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; text-align: center; }
    .count-box .num { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .count-box.critical { border-top: 4px solid var(--crit); } .count-box.high { border-top: 4px solid var(--high); }
    .count-box.medium { border-top: 4px solid var(--med); } .count-box.low { border-top: 4px solid var(--low); }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block title %}Security Assessment Report{% endblock %}</h1>
            <div class="meta">
                <span><strong>Target:</strong> {{ url }}</span>
                <span><strong>Date:</strong> {{ scan_time }}</span>
                <span><strong>Auditor:</strong> {{ scanned_by }}</span>
            </div>
        </div>

        {% block content %}{% endblock %}

        <div style="margin-top: 4rem; text-align: center; color: var(--border); font-size: 0.8rem; border-top: 1px solid var(--border); padding-top: 2rem;">
            Generated by Security Management Platform (SMP)
        </div>
    </div>
</body>
</html>
